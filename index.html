<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOLT CrossFit Performance</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .stat-card h3 {
            color: #667eea;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 2.2em;
            font-weight: bold;
            color: #333;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.4em;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        .tab-btn {
            padding: 10px 20px;
            background: none;
            color: #666;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-weight: 500;
            width: auto;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .athlete-item {
            background: #f9fafb;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 12px;
            border-left: 4px solid #667eea;
        }

        .athlete-item h4 {
            color: #333;
            margin-bottom: 8px;
        }

        .athlete-item p {
            margin: 3px 0;
            color: #666;
            font-size: 0.95em;
        }

        .acwr-badge {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: bold;
            margin: 5px 0;
        }

        .acwr-optimal {
            background: #d1fae5;
            color: #065f46;
        }

        .acwr-warning {
            background: #fef3c7;
            color: #92400e;
        }

        .acwr-danger {
            background: #fee2e2;
            color: #991b1b;
        }

        .recommendation {
            background: #eff6ff;
            border-left: 4px solid #667eea;
            padding: 12px;
            margin: 10px 0;
            border-radius: 4px;
            color: #1e40af;
        }

        .message {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }

        .message.success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin-bottom: 20px;
        }

        @media (max-width: 1024px) {
            .grid-3 {
                grid-template-columns: 1fr;
            }
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ BOLT CrossFit Performance System</h1>
            <p>Análisis inteligente de carga y recuperación en tiempo real</p>
        </header>

        <!-- STATS -->
        <div class="grid-3">
            <div class="stat-card">
                <h3>👥 Atletas</h3>
                <div class="stat-value" id="total-athletes">0</div>
            </div>
            <div class="stat-card">
                <h3>🏋️ Entrenamientos</h3>
                <div class="stat-value" id="total-workouts">0</div>
            </div>
            <div class="stat-card">
                <h3>😴 Recuperaciones</h3>
                <div class="stat-value" id="total-recoveries">0</div>
            </div>
        </div>

        <div class="grid-2">
            <!-- DASHBOARD PRINCIPAL -->
            <div class="card">
                <h2>📊 Dashboard ACWR</h2>
                <div class="chart-container">
                    <canvas id="acwrChart"></canvas>
                </div>
                <div id="selected-athlete-info"></div>
            </div>

            <!-- FORMULARIOS -->
            <div class="card">
                <h2>📝 Formularios</h2>

                <div class="tabs">
                    <button class="tab-btn active" onclick="showTab('athlete-tab')">👤 Atleta</button>
                    <button class="tab-btn" onclick="showTab('recovery-tab')">😴 Recuperación</button>
                    <button class="tab-btn" onclick="showTab('workout-tab')">🏋️ Entrenamiento</button>
                </div>

                <div id="message" class="message"></div>

                <!-- TAB: Atleta -->
                <div id="athlete-tab" class="tab-content active">
                    <form onsubmit="addAthlete(event)">
                        <div class="form-group">
                            <label>Nombre *</label>
                            <input type="text" id="athlete-name" required>
                        </div>
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" id="athlete-email" required>
                        </div>
                        <button type="submit">✅ Registrar</button>
                    </form>
                </div>

                <!-- TAB: Recuperación -->
                <div id="recovery-tab" class="tab-content">
                    <form onsubmit="addRecovery(event)">
                        <div class="form-group">
                            <label>Atleta *</label>
                            <select id="recovery-athlete" required></select>
                        </div>
                        <div class="form-group">
                            <label>Sueño (horas) *</label>
                            <input type="number" id="recovery-sleep" min="0" max="12" step="0.5" value="8" required>
                        </div>
                        <div class="form-group">
                            <label>Estrés (1-5) *</label>
                            <input type="number" id="recovery-stress" min="1" max="5" value="3" required>
                        </div>
                        <div class="form-group">
                            <label>Dolor (1-5) *</label>
                            <input type="number" id="recovery-pain" min="1" max="5" value="2" required>
                        </div>
                        <button type="submit">✅ Guardar</button>
                    </form>
                </div>

                <!-- TAB: Entrenamiento -->
                <div id="workout-tab" class="tab-content">
                    <form onsubmit="addWorkout(event)">
                        <div class="form-group">
                            <label>Atleta *</label>
                            <select id="workout-athlete" required></select>
                        </div>
                        <div class="form-group">
                            <label>WOD *</label>
                            <input type="text" id="workout-name" placeholder="Fran, Cindy, Helen..." required>
                        </div>
                        <div class="form-group">
                            <label>Carga IMR (0-100) *</label>
                            <input type="number" id="workout-load" min="0" max="100" value="60" required>
                        </div>
                        <div class="form-group">
                            <label>Duración (min) *</label>
                            <input type="number" id="workout-duration" min="1" max="180" value="20" required>
                        </div>
                        <button type="submit">✅ Guardar</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- ATLETAS Y ACWR -->
        <div class="card">
            <h2>⚡ Análisis de Atletas (ACWR)</h2>
            <div id="athletes-analysis"></div>
        </div>
    </div>

    <script>
        let athletes = JSON.parse(localStorage.getItem('bolt-athletes')) || [];
        let workouts = JSON.parse(localStorage.getItem('bolt-workouts')) || [];
        let recoveries = JSON.parse(localStorage.getItem('bolt-recoveries')) || [];
        let acwrChart = null;

        const ACWR_ZONES = {
            optimal: { min: 0.8, max: 1.3, color: '#10b981', text: '🟢 Óptimo' },
            warning: { min: 1.3, max: 1.5, color: '#f59e0b', text: '🟡 Alerta' },
            danger: { min: 1.5, max: Infinity, color: '#ef4444', text: '🔴 Peligro' }
        };

        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function showMessage(message, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = message;
            msgDiv.className = `message ${type}`;
            setTimeout(() => msgDiv.className = 'message', 4000);
        }

        function saveToStorage() {
            localStorage.setItem('bolt-athletes', JSON.stringify(athletes));
            localStorage.setItem('bolt-workouts', JSON.stringify(workouts));
            localStorage.setItem('bolt-recoveries', JSON.stringify(recoveries));
        }

        function calculateACWR(athleteId) {
            const athleteWorkouts = workouts.filter(w => w.athleteId === athleteId);
            if (athleteWorkouts.length === 0) return 0;

            const today = new Date();
            const acuteStart = new Date(today);
            acuteStart.setDate(acuteStart.getDate() - 7);
            const chronicStart = new Date(today);
            chronicStart.setDate(chronicStart.getDate() - 28);

            const acuteLoad = athleteWorkouts
                .filter(w => new Date(w.date) >= acuteStart)
                .reduce((sum, w) => sum + w.load, 0);

            const chronicLoad = athleteWorkouts
                .filter(w => new Date(w.date) >= chronicStart)
                .reduce((sum, w) => sum + w.load, 0);

            if (chronicLoad === 0) return 0;
            return (acuteLoad / (chronicLoad / 4)).toFixed(2);
        }

        function getACWRZone(acwr) {
            if (acwr <= ACWR_ZONES.optimal.max) return { ...ACWR_ZONES.optimal, value: acwr };
            if (acwr <= ACWR_ZONES.warning.max) return { ...ACWR_ZONES.warning, value: acwr };
            return { ...ACWR_ZONES.danger, value: acwr };
        }

        function getRecommendation(acwr) {
            if (acwr <= 0.8) return '💚 Carga baja: Aumenta intensidad, cuerpo está recuperado';
            if (acwr <= 1.3) return '🟢 Zona óptima: Mantén este ritmo de entrenamiento';
            if (acwr <= 1.5) return '🟡 Alerta: Reduce volumen, aumenta recuperación, monitorea fatiga';
            return '🔴 Peligro: DESCANSA. Alto riesgo de lesión. Toma 1-2 días de recuperación';
        }

        function addAthlete(event) {
            event.preventDefault();
            const athlete = {
                id: Date.now(),
                name: document.getElementById('athlete-name').value,
                email: document.getElementById('athlete-email').value,
                createdAt: new Date().toISOString()
            };
            athletes.push(athlete);
            saveToStorage();
            updateUI();
            showMessage(`✅ "${athlete.name}" registrado`, 'success');
            event.target.reset();
        }

        function addRecovery(event) {
            event.preventDefault();
            const athleteId = parseInt(document.getElementById('recovery-athlete').value);
            recoveries.push({
                id: Date.now(),
                athleteId,
                sleep: parseFloat(document.getElementById('recovery-sleep').value),
                stress: parseInt(document.getElementById('recovery-stress').value),
                pain: parseInt(document.getElementById('recovery-pain').value),
                date: new Date().toISOString()
            });
            saveToStorage();
            updateUI();
            showMessage('✅ Recuperación guardada', 'success');
            event.target.reset();
        }

        function addWorkout(event) {
            event.preventDefault();
            const athleteId = parseInt(document.getElementById('workout-athlete').value);
            const workout = {
                id: Date.now(),
                athleteId,
                name: document.getElementById('workout-name').value,
                load: parseInt(document.getElementById('workout-load').value),
                duration: parseInt(document.getElementById('workout-duration').value),
                date: new Date().toLocaleDateString()
            };
            workouts.push(workout);
            saveToStorage();
            updateUI();
            showMessage(`✅ "${workout.name}" registrado`, 'success');
            event.target.reset();
        }

        function updateAthleteSelects() {
            ['recovery-athlete', 'workout-athlete'].forEach(id => {
                document.getElementById(id).innerHTML = athletes.length > 0
                    ? athletes.map(a => `<option value="${a.id}">${a.name}</option>`).join('')
                    : '<option value="">Registra un atleta</option>';
            });
        }

        function updateUI() {
            updateAthleteSelects();
            updateStats();
            updateAnalysis();
            updateChart();
        }

        function updateStats() {
            document.getElementById('total-athletes').textContent = athletes.length;
            document.getElementById('total-workouts').textContent = workouts.length;
            document.getElementById('total-recoveries').textContent = recoveries.length;
        }

        function updateAnalysis() {
            const html = athletes.map(athlete => {
                const athleteWorkouts = workouts.filter(w => w.athleteId === athlete.id);
                const athleteRecoveries = recoveries.filter(r => r.athleteId === athlete.id);
                const acwr = calculateACWR(athlete.id);
                const zone = getACWRZone(acwr);
                const recommendation = getRecommendation(acwr);

                return `
                    <div class="athlete-item">
                        <h4>${athlete.name}</h4>
                        <p>📧 ${athlete.email}</p>
                        <p>🏋️ Entrenamientos: ${athleteWorkouts.length} | 😴 Recuperaciones: ${athleteRecoveries.length}</p>
                        <div class="acwr-badge acwr-${Object.keys(ACWR_ZONES).find(k => zone === ACWR_ZONES[k])}">
                            ACWR: ${acwr} ${zone.text}
                        </div>
                        <div class="recommendation">${recommendation}</div>
                    </div>
                `;
            }).join('');

            document.getElementById('athletes-analysis').innerHTML = html || '<p style="color: #999;">No hay atletas registrados</p>';
        }

        function updateChart() {
            const ctx = document.getElementById('acwrChart').getContext('2d');
            const labels = athletes.map(a => a.name);
            const acwrData = athletes.map(a => calculateACWR(a.id));
            const colors = acwrData.map(acwr => {
                if (acwr <= 1.3) return '#10b981';
                if (acwr <= 1.5) return '#f59e0b';
                return '#ef4444';
            });

            if (acwrChart) {
                acwrChart.data.labels = labels;
                acwrChart.data.datasets[0].data = acwrData;
                acwrChart.data.datasets[0].backgroundColor = colors;
                acwrChart.update();
            } else {
                acwrChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels,
                        datasets: [{
                            label: 'ACWR',
                            data: acwrData,
                            backgroundColor: colors,
                            borderRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        indexAxis: 'y',
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            x: {
                                min: 0,
                                max: 2,
                                ticks: { stepSize: 0.3 }
                            }
                        }
                    }
                });
            }
        }

        updateUI();
    </script>
</body>
</html>
